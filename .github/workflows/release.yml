name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Build (Release, unsigned)
        run: |
          xcodebuild \
            -project "Open Timer.xcodeproj" \
            -scheme "Open Timer" \
            -configuration Release \
            -destination "platform=macOS" \
            -derivedDataPath /tmp/DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        run: |
          mkdir -p /tmp/OpenTimerDMG
          cp -R "/tmp/DerivedData/Build/Products/Release/Open Timer.app" /tmp/OpenTimerDMG/

          create-dmg \
            --volname "Open Timer" \
            --window-pos 200 120 \
            --window-size 660 400 \
            --icon-size 120 \
            --text-size 14 \
            --icon "Open Timer.app" 180 200 \
            --hide-extension "Open Timer.app" \
            --app-drop-link 480 200 \
            "Open-Timer-${{ github.ref_name }}.dmg" \
            "/tmp/OpenTimerDMG"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: Open-Timer-${{ github.ref_name }}.dmg
